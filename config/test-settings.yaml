server:
  host: "0.0.0.0"
  port: 3000
  workers: 4

default_strategy: "mask"
patterns:
  - email
  - phone_ru
  - ip_address

custom_patterns:
  - name: "order_number"
    pii_type: "unknown"
    pattern: "\\bORD-\\d{6,}\\b"
    confidence: 0.9
  - name: "bad_regex"
    pii_type: "unknown"
    pattern: "[invalid("
    confidence: 0.9

custom_known_domains:
  - "my-company.com"
  - "internal.corp"

mcp:
  enabled: false
  transport: "sse"
  server_name: "test"
  server_version: "0.1.0"

proxy:
  upstream_servers: {}

logging:
  level: "info"
  format: "pretty"
