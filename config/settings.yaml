# Server configuration
server:
  host: "0.0.0.0"
  port: 3000
  workers: 4

# Anonymizer settings (flattened into root)
default_strategy: "mask"  # replace, mask, hash
patterns:
  - email
  - phone_ru
  - passport_ru
  - credit_card
  - ip_address
  - snils
  - inn
  - api_key_aws
  - api_key_github
  - access_token_jwt
  - ssh_key_rsa
  - ssh_key_ed25519
  - domain_unknown

# Кастомные PII паттерны (добавьте свои regex паттерны)
# custom_patterns:
#   - name: "order_number"
#     pii_type: "unknown"
#     pattern: "\\bORD-\\d{6,}\\b"
#     confidence: 0.9
#   - name: "internal_id"
#     pii_type: "unknown"
#     pattern: "\\bINT-[A-Z]{2}-\\d{4}\\b"
#     confidence: 0.85

# Кастомные известныеные домены (не будут маскироваться)
# custom_known_domains:
#   - "my-company.com"
#   - "internal.corp"

# MCP configuration
mcp:
  enabled: true
  transport: "sse"  # sse, stdio
  server_name: "PII Anonymizer"
  server_version: "0.1.0"

# Proxy configuration — upstream MCP servers
#
# Подключение к внешним MCP серверам. Поддерживаемые транспорты:
#   - stdio: запуск subprocess (docker, локальная команда и т.д.)
#   - http: подключение к HTTP/SSE endpoint
#
# Переменные окружения с пустыми значениями автоматически подставляются
# из окружения процесса (удобно для secrets в docker-compose).

# Пример — любой MCP Server через HTTP:
#   proxy:
#     upstream_servers:
#       my_server:
#         transport: http
#         url: "http://my-mcp-server:8080/sse"
#         enabled: true

# Пример — GitHub MCP Server через Docker (требует токен):
#   proxy:
#     upstream_servers:
#       github:
#         transport: stdio
#         command: docker
#         args: ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "ghcr.io/github/github-mcp-server"]
#         env:
#           GITHUB_PERSONAL_ACCESS_TOKEN: ""  # подставится из окружения
#         enabled: true
#         anonymize_fields:
#           create_issue: ["body", "title"]
#           create_pull_request: ["body", "title"]

# Пример — SearXNG MCP Server (веб-поиск, без токенов):
#   proxy:
#     upstream_servers:
#       searxng:
#         transport: stdio
#         command: docker
#         args: ["run", "-i", "--rm", "-e", "SEARXNG_URL", "isokoliuk/mcp-searxng:latest"]
#         env:
#           SEARXNG_URL: "http://searxng:8080"
#         enabled: true
#         anonymize_fields:
#           searxng_web_search: ["query"]   # анонимизировать поисковый запрос
#           web_url_read: []                 # [] = не анонимизировать

proxy:
  upstream_servers: {}

# Logging
logging:
  level: "info"  # trace, debug, info, warn, error
  format: "pretty"  # pretty, json
