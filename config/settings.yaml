# Server configuration
server:
  host: "0.0.0.0"
  port: 3000
  workers: 4

# Anonymizer settings (flattened into root)
default_strategy: "mask"  # replace, mask, hash
patterns:
  - email
  - phone_ru
  - passport_ru
  - credit_card
  - ip_address
  - snils
  - inn
  - api_key_aws
  - api_key_github
  - access_token_jwt
  - ssh_key_rsa
  - ssh_key_ed25519
  - domain_unknown

# MCP configuration
mcp:
  enabled: true
  transport: "sse"  # sse, stdio
  server_name: "PII Anonymizer"
  server_version: "0.1.0"

# Proxy configuration — upstream MCP servers
# 
# Подключение к внешним MCP серверам. Поддерживаемые транспорты:
#   - stdio: запуск subprocess (локально)
#   - http: подключение к HTTP/SSE endpoint
#
# Пример с GitHub MCP Server (локальный запуск):
#   proxy:
#     upstream_servers:
#       github:
#         transport: stdio
#         command: docker
#         args: [run, -i, --rm, -e, GITHUB_PERSONAL_ACCESS_TOKEN, ghcr.io/github/github-mcp-server]
#         env:
#           GITHUB_PERSONAL_ACCESS_TOKEN: "ваш_токен"
#         enabled: true
#
# Пример с HTTP MCP сервером:
#       remote:
#         transport: http
#         url: "http://localhost:8080/sse"
#         enabled: true

proxy:
  upstream_servers: {}

# Logging
logging:
  level: "info"  # trace, debug, info, warn, error
  format: "pretty"  # pretty, json
