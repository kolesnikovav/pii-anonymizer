# Server configuration
server:
  host: "0.0.0.0"
  port: 3000
  workers: 4

# Anonymizer settings
anonymizer:
  default_strategy: "mask"  # mask, hash, replace, redact
  patterns:
    - email
    - phone
    - passport
    - credit_card
    - ip_address
  mask_char: "*"
  mask_length: 10

# MCP configuration
mcp:
  enabled: true
  transport: "sse"  # sse, stdio
  server_name: "PII Anonymizer"
  server_version: "0.1.0"

# Proxy configuration
proxy:
  enabled: false
  upstream_servers: []
    # - name: "external-ai"
    #   url: "http://localhost:8080/mcp"
    #   timeout: 30

# Logging
logging:
  level: "info"  # trace, debug, info, warn, error
  format: "pretty"  # pretty, json
