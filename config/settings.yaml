# Server configuration
server:
  host: "0.0.0.0"
  port: 3000
  workers: 4

# Anonymizer settings (flattened into root)
default_strategy: "mask"  # replace, mask, hash
patterns:
  - email
  - phone_ru
  - passport_ru
  - credit_card
  - ip_address
  - snils
  - inn
  - api_key_aws
  - api_key_github
  - access_token_jwt
  - ssh_key_rsa
  - ssh_key_ed25519
  - domain_unknown

# MCP configuration
mcp:
  enabled: true
  transport: "sse"  # sse, stdio
  server_name: "PII Anonymizer"
  server_version: "0.1.0"

# Proxy configuration — upstream MCP servers
proxy:
  upstream_servers:
    # GitHub MCP Server — подключается через HTTP proxy
    github:
      transport: http
      url: "http://github-mcp-proxy:3001"
      enabled: true  # Включено для проксирования через PII-Anonymizer

# Logging
logging:
  level: "info"  # trace, debug, info, warn, error
  format: "pretty"  # pretty, json
