services:
  # PII Anonymizer MCP Server
  pii-anonymizer:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: pii-anonymizer-gh
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ../../config:/app/config:ro
      - /run/user/1000/docker.sock:/var/run/docker.sock
    user: root
    environment:
      - ANONYMIZER__DEFAULT_STRATEGY=mask
      - RUST_LOG=info
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:?GITHUB_PERSONAL_ACCESS_TOKEN is required}
    networks:
      - mcp-network-gh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # AnythingLLM
  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: anythingllm-gh
    restart: unless-stopped
    ports:
      - "3001:3001"
    cap_add:
      - SYS_ADMIN
    volumes:
      - anythingllm-gh-storage:/app/server/storage
      - ./mcp_servers.json:/app/server/storage/plugins/anythingllm_mcp_servers.json
    environment:
      - STORAGE_DIR=/app/server/storage
      - JWT_SECRET=change-me-to-random-string
    depends_on:
      pii-anonymizer:
        condition: service_healthy
    networks:
      - mcp-network-gh

volumes:
  anythingllm-gh-storage:
    driver: local

networks:
  mcp-network-gh:
    driver: bridge
