services:
  # GitHub MCP HTTP Proxy — оборачивает stdio GitHub MCP в HTTP endpoint
  github-mcp-proxy:
    build: ./github-mcp-proxy
    container_name: github-mcp-proxy
    restart: unless-stopped
    ports:
      - "3010:3001"
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_TOKEN}
      - GITHUB_TOOLSETS=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Для запуска GitHub MCP контейнера
    networks:
      - mcp-network

  # PII Anonymizer MCP Server
  pii-anonymizer:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: pii-anonymizer
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ../../config:/app/config:ro
    environment:
      - ANONYMIZER__DEFAULT_STRATEGY=mask
      - RUST_LOG=info
    depends_on:
      - github-mcp-proxy
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # AnythingLLM
  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: anythingllm
    restart: unless-stopped
    ports:
      - "3001:3001"
    cap_add:
      - SYS_ADMIN
    volumes:
      - anythingllm-storage:/app/server/storage
    environment:
      - STORAGE_DIR=/app/server/storage
      - JWT_SECRET=change-me-to-random-string
    depends_on:
      pii-anonymizer:
        condition: service_healthy
    networks:
      - mcp-network

volumes:
  anythingllm-storage:
    driver: local

networks:
  mcp-network:
    driver: bridge
