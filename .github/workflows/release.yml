name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Step 1: Tests ──
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --lib

  # ── Step 2: Build release binary ──
  build-binary:
    name: Build Binary
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      - name: Strip binary
        run: strip target/release/pii-anonymizer

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Rename binary
        run: |
          cp target/release/pii-anonymizer pii-anonymizer-v${{ steps.version.outputs.version }}-x86_64-linux

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pii-anonymizer-bin
          path: pii-anonymizer-v${{ steps.version.outputs.version }}-x86_64-linux
          retention-days: 1

  # ── Step 3: Build .deb package ──
  build-deb:
    name: Build .deb Package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      - name: Build .deb
        run: cargo deb --no-build --no-strip

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Find .deb file
        id: debfile
        run: |
          DEB_FILE=$(ls target/debian/pii-anonymizer_*.deb | head -1)
          echo "path=$DEB_FILE" >> $GITHUB_OUTPUT
          echo "Found: $DEB_FILE"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: pii-anonymizer-deb
          path: ${{ steps.debfile.outputs.path }}
          retention-days: 1

  # ── Step 4: Build amd64 binary for Docker ──
  build-amd64:
    name: Build amd64 Binary
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      - name: Strip binary
        run: strip target/release/pii-anonymizer

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pii-anonymizer-amd64
          path: target/release/pii-anonymizer
          retention-days: 1

  # ── Step 5: Build arm64 binary for Docker (cross-compile) ──
  build-arm64:
    name: Build arm64 Binary
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add arm64 target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Install cross linker and OpenSSL
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: |
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig \
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
          cargo build --release --locked --target aarch64-unknown-linux-gnu

      - name: Strip binary
        run: strip target/aarch64-unknown-linux-gnu/release/pii-anonymizer

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pii-anonymizer-arm64
          path: target/aarch64-unknown-linux-gnu/release/pii-anonymizer
          retention-days: 1

  # ── Step 6: Build and push Docker images ──
  build-docker:
    name: Build & Push Docker Images
    needs: [build-amd64, build-arm64, build-binary, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            artifact: pii-anonymizer-amd64
          - arch: arm64
            platform: linux/arm64
            artifact: pii-anonymizer-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: binary

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.standalone
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ARCH=${{ matrix.arch }}

  # ── Step 7: Create multi-arch manifest ──
  create-manifest:
    name: Create Multi-arch Manifest
    needs: build-docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          docker buildx imagetools create \
            -t $IMAGE \
            -t "${IMAGE%%:*}:latest" \
            $IMAGE-amd64 \
            $IMAGE-arm64

  # ── Step 5: Create GitHub Release ──
  create-release:
    name: Create GitHub Release
    needs: [build-binary, build-deb, create-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: pii-anonymizer-bin

      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: pii-anonymizer-deb

      - name: Find .deb file
        id: debpath
        run: |
          DEB_FILE=$(ls *.deb | head -1)
          echo "path=$DEB_FILE" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^v$" | sed -n '2p' || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "changelog=Initial release" >> $GITHUB_OUTPUT
          else
            LOG=$(git log --pretty=format:"- %s" $PREV_TAG..HEAD)
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$LOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changelog }}

            ## Artifacts

            - **Docker**: `ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}`
            - **Binary**: `pii-anonymizer-v${{ steps.version.outputs.version }}-x86_64-linux`
            - **Debian**: `pii-anonymizer_${{ steps.version.outputs.version }}_amd64.deb`

            ## Quick Start

            ### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            docker run -p 3000:3000 ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ```

            ### Debian
            ```bash
            sudo dpkg -i pii-anonymizer_${{ steps.version.outputs.version }}_amd64.deb
            ```

            ### Binary
            ```bash
            chmod +x pii-anonymizer-v${{ steps.version.outputs.version }}-x86_64-linux
            ./pii-anonymizer-v${{ steps.version.outputs.version }}-x86_64-linux
            ```
          files: |
            pii-anonymizer-v${{ steps.version.outputs.version }}-x86_64-linux
            ${{ steps.debpath.outputs.path }}
          draft: false
          prerelease: false
          generate_release_notes: false
